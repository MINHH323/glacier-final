<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glacier Defender</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="lvl">STAGE <span id="level-num">1</span></div>
        <div class="hp-bar-bg"><div id="hp-fill" class="hp-fill"></div></div>
        <div class="progress-container"><div id="prog-fill" class="progress-fill"></div></div>
    </div>

    <div id="viewport" class="viewport">
        <div class="stats">SCORE: <span id="score-text">0</span></div>
        <div id="glacier" class="glacier"></div>

        <div id="start-screen" class="overlay">
            <div class="content-box">
                <h1 class="neon-text">GLACIER DEFENDER</h1>
                <p>블랙카본을 클릭해서 빙하를 지키세요!</p>
                <input type="text" id="user-name" placeholder="닉네임 입력">
                <button onclick="startGame()">MISSION START</button>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display:none;">
            <div class="content-box">
                <h2>MISSION OVER</h2>
                <div id="final-score" class="final-score">0</div>
                <div class="ranking-box">
                    <small>GLOBAL TOP 5</small>
                    <div id="rank-list">로딩 중...</div>
                </div>
                <button onclick="location.reload()">RETRY</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
